<!DOCTYPE html>

<style>.legal-lang-toggle{display:flex;gap:4px;background:var(--chip-bg);border:1px solid var(--border);border-radius:20px;padding:3px;}
.legal-lang-toggle button{border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:16px;cursor:pointer;transition:all .15s;}
.legal-lang-toggle button.active{background:var(--text);color:var(--bg,#0a0a0a);}
.legal-nav{gap:10px;flex-wrap:wrap;}</style>
</head>
<body>
<div class="legal-page">
  <div class="legal-nav">
    <a href="/" class="legal-logo">ZenithW<span>.</span></a>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="legal-lang-toggle" id="legalLangToggle">
        <button data-lang="tr" onclick="setLegalLang('tr')">TR</button>
        <button data-lang="en" onclick="setLegalLang('en')">EN</button>
      </div>
      <a href="/" class="legal-back" id="pgBack">← ana sayfa</a>
    </div>
  </div>
  <div class="legal-hero">

    <div class="legal-updated" id="pgUpdated">Son güncelleme: 11 Temmuz 2026</div>
  </div>
  <div class="legal-body" id="pgBody"></div>
  <div class="legal-footer" id="pgFooter"></div>
</div>

<script>
const TX={
  tr:{
    title:'Gizlilik Politikası — ZenithW',
    desc:'ZenithW gizlilik politikası: hangi verileri topluyoruz, hangilerini toplamıyoruz ve kullanıcı verilerini nasıl koruyoruz.',
    h1:'Gizlilik Politikası', updated:'Son güncelleme: 11 Temmuz 2026', back:'← ana sayfa',
    body:`
      <h2>Ne topluyoruz, ne toplamıyoruz</h2>
      <p>ZenithW, video/ses indirme işlemini gerçekleştirebilmek için girdiğiniz linki geçici olarak sunucuya iletir. Bu istek dışında hesap oluşturmanızı istemeyiz, kimlik bilgisi talep etmeyiz ve indirdiğiniz içerikleri sunucumuzda kalıcı olarak saklamayız.</p>
      <ul>
        <li><strong>İndirme geçmişi</strong> sunucuda tutulmaz — yalnızca kendi tarayıcınızın yerel deposunda (localStorage) saklanır ve yalnızca siz görebilirsiniz.</li>
        <li><strong>İndirilen dosyalar</strong> işlem tamamlandıktan kısa bir süre sonra (genellikle 30 dakika içinde) sunucudan otomatik olarak silinir.</li>
        <li>Kayıt/üyelik sistemi yoktur; e-posta, şifre veya kişisel kimlik bilgisi toplanmaz.</li>
      </ul>
      <h2>Teknik / işlevsel veriler</h2>
      <p>Hizmetin çalışması ve kötüye kullanımın önlenmesi için sınırlı teknik veriler işlenir:</p>
      <ul>
        <li><strong>IP adresi</strong>, yalnızca hız sınırlama (rate limiting) amacıyla kısa süreli olarak bellekte tutulur; kalıcı bir veritabanında saklanmaz.</li>
        <li>Sunucu günlükleri (loglar), hata teşhisi için kısa süreliğine tutulur ve düzenli olarak temizlenir.</li>
        <li>Tercihleriniz (tema, dil, kalite ayarları vb.) yalnızca kendi cihazınızda, tarayıcı yerel deposunda saklanır.</li>
      </ul>
      <h2>Üçüncü taraf hizmetler</h2>
      <p>Site, barındırma için Railway altyapısını kullanır. Bu sağlayıcılar kendi gizlilik politikaları çerçevesinde standart sunucu/istek günlükleri tutabilir. ZenithW bu verilerin içeriğini üçüncü taraflarla pazarlama amacıyla paylaşmaz ve reklam ağlarına veri satmaz.</p>
      <h2>Çerezler</h2>
      <p>Site, oturum takibi veya reklam amaçlı çerez kullanmaz. Kullanılan tek yerel depolama, tercihlerinizi ve indirme geçmişinizi cihazınızda tutmak içindir; bunu istediğiniz zaman tarayıcı ayarlarından silebilirsiniz.</p>
      <h2>Haklarınız</h2>
      <p>Sunucuda sizinle ilişkilendirilebilecek kalıcı bir kullanıcı verisi tutulmadığından, silinmesi gereken bir "hesap verisi" bulunmaz. Tarayıcınızdaki yerel geçmiş ve tercihleri istediğiniz an kendiniz temizleyebilirsiniz. Sorularınız için bizimle iletişime geçebilirsiniz.</p>
      <h2>İletişim</h2>
      <p>Gizlilikle ilgili sorularınız için: <a href="mailto:info@zenithw.space">info@zenithw.space</a></p>`,
    footer:'<a href="/">ana sayfa</a>·<a href="/terms.html">kullanım koşulları</a>·<a href="/dmca.html">telif bildirimi</a>·<a href="/status.html">durum</a>'
  },
  en:{
    title:'Privacy Policy — ZenithW',
    desc:"ZenithW privacy policy: what data we collect, what we don't, and how we protect user data.",
    h1:'Privacy Policy', updated:'Last updated: July 11, 2026', back:'← home',
    body:`
      <h2>What we collect, and what we don't</h2>
      <p>To perform a video/audio download, ZenithW temporarily passes the link you enter to the server. Beyond that single request, we don't ask you to create an account, we don't request identifying information, and we don't permanently store the content you download.</p>
      <ul>
        <li><strong>Download history</strong> is never kept on the server — it's stored only in your own browser's local storage (localStorage) and is visible only to you.</li>
        <li><strong>Downloaded files</strong> are automatically deleted from the server shortly after processing completes (typically within 30 minutes).</li>
        <li>There's no account/membership system; we don't collect email addresses, passwords, or personal identification.</li>
      </ul>
      <h2>Technical / functional data</h2>
      <p>A limited amount of technical data is processed to keep the service running and to prevent abuse:</p>
      <ul>
        <li><strong>IP address</strong> is held briefly in memory solely for rate limiting; it is not stored in a permanent database.</li>
        <li>Server logs are kept briefly for troubleshooting and are cleared regularly.</li>
        <li>Your preferences (theme, language, quality settings, etc.) are stored only on your own device, in your browser's local storage.</li>
      </ul>
      <h2>Third-party services</h2>
      <p>The site uses Railway infrastructure for hosting. These providers may keep standard server/request logs under their own privacy policies. ZenithW does not share the contents of this data with third parties for marketing purposes and does not sell data to ad networks.</p>
      <h2>Cookies</h2>
      <p>The site does not use cookies for session tracking or advertising. The only local storage used is to keep your preferences and download history on your device; you can clear it at any time from your browser settings.</p>
      <h2>Your rights</h2>
      <p>Because no persistent user data tied to you is kept on the server, there's no "account data" that needs deleting. You can clear your local history and preferences yourself at any time. Feel free to reach out with any questions.</p>
      <h2>Contact</h2>
      <p>For privacy-related questions: <a href="mailto:info@zenithw.space">info@zenithw.space</a></p>`,
    footer:'<a href="/">home</a>·<a href="/terms.html">terms of service</a>·<a href="/dmca.html">copyright notice</a>·<a href="/status.html">status</a>'
  }
};
function setLegalLang(l){
  const t=TX[l]||TX.en;
  document.documentElement.lang=l;
  document.getElementById('pgTitle').textContent=t.title;
  document.getElementById('pgDesc').setAttribute('content',t.desc);
  document.getElementById('pgH1').textContent=t.h1;
  document.getElementById('pgUpdated').textContent=t.updated;
  document.getElementById('pgBack').textContent=t.back;
  document.getElementById('pgBody').innerHTML=t.body;
  document.getElementById('pgFooter').innerHTML=t.footer;
  document.querySelectorAll('#legalLangToggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  try{localStorage.setItem('zw_lang',l);}catch(e){}
}
(function(){
  let saved='tr';
  try{saved=localStorage.getItem('zw_lang')||'tr';}catch(e){}
  if(saved!=='tr')saved='en'; // bu sayfada yalnızca tr/en var; fr/de için en'e düş
  setLegalLang(saved);
})();
</script>
</body>
</html>
