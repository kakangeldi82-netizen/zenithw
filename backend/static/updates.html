const TX={
  tr:{title:'Güncellemeler — ZenithW',desc:'ZenithW sürüm geçmişi ve güncelleme notları — yeni özellikler, hata düzeltmeleri ve iyileştirmeler.',
    h1:'Güncellemeler',sub:'ZenithW\'nin sürüm geçmişi ve yayınlanan tüm değişiklikler.',back:'← ana sayfa',latestLabel:'GÜNCEL',
    footer:'<a href="/">ana sayfa</a>·<a href="/privacy.html">gizlilik</a>·<a href="/terms.html">kullanım koşulları</a>·<a href="/dmca.html">telif bildirimi</a>'},
  en:{title:'Updates — ZenithW',desc:'ZenithW release history and changelog — new features, bug fixes, and improvements.',
    h1:'Updates',sub:'ZenithW\'s release history and everything that\'s shipped so far.',back:'← home',latestLabel:'LATEST',
    footer:'<a href="/">home</a>·<a href="/privacy.html">privacy</a>·<a href="/terms.html">terms of service</a>·<a href="/dmca.html">copyright notice</a>'}
};

let CUR_LANG='tr';

function jumpTo(ver,ev){
  if(ev)ev.stopPropagation();
  history.pushState(null,'','#'+ver);
  renderUpdates();
}

function renderUpdates(){
  const t=TX[CUR_LANG];
  const targetHash=decodeURIComponent((location.hash||'').replace('#',''));
  const container=document.getElementById('updEntries');
  container.innerHTML=UPDATES.map((u,i)=>{
    const badgesHtml=u.badges.map(b=>`<span class="badge badge-${b}">${b}</span>`).join('');
    const date=CUR_LANG==='tr'?u.dateTr:u.dateEn;
    const bullets=CUR_LANG==='tr'?u.bulletsTr:u.bulletsEn;
    const items=bullets.map(b=>`<li>${b}</li>`).join('');
    const id=u.ver;
    const isTarget=(targetHash===id);
    const openCls=(u.latest||isTarget)?' open':'';
    const latestCls=u.latest?' latest':'';
    const hlCls=isTarget?' highlight':'';
    const latestBadge=u.latest?`<span class="badge" style="background:var(--accent,#3bba64);color:#fff;border:none;">${t.latestLabel}</span>`:'';
    // UPDATES en yeniden en eskiye sıralı: bir önceki eleman (i-1) daha yeni, bir sonraki (i+1) daha eski.
    const newer=UPDATES[i-1], older=UPDATES[i+1];
    const navHtml=(newer||older)?`<div class="upd-nav-row">
        ${newer?`<span class="upd-nav-link" onclick="jumpTo('${newer.ver}',event)">← ${newer.ver}</span>`:'<span></span>'}
        ${older?`<span class="upd-nav-link" onclick="jumpTo('${older.ver}',event)">${older.ver} →</span>`:'<span></span>'}
      </div>`:'';
    return `<div class="upd-entry${latestCls}${hlCls} upd-accordion${openCls}" id="${id}" onclick="toggleAccordion(this)">
      <div class="upd-accordion-header">
        <div class="upd-ver-row"><span class="upd-ver">${u.ver}</span>${latestBadge}${badgesHtml}<span class="upd-date">${date}</span></div>
        <span class="upd-accordion-icon">▼</span>
      </div>
      <div class="upd-accordion-content"><ul class="upd-list-simple">${items}</ul>${navHtml}</div>
    </div>`;
  }).join('');
  if(targetHash){
    const el=document.getElementById(targetHash);
    if(el)setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),80);
  }
}

function toggleAccordion(el){el.classList.toggle('open');}

function setLegalLang(l){
  const t=TX[l]||TX.en;
  CUR_LANG=TX[l]?l:'en';
  document.documentElement.lang=CUR_LANG;
  document.getElementById('pgTitle').textContent=t.title;
  document.getElementById('pgDesc').setAttribute('content',t.desc);
  document.getElementById('pgH1').textContent=t.h1;
  document.getElementById('pgSub').textContent=t.sub;
  document.getElementById('pgBack').textContent=t.back;
  document.getElementById('pgFooter').innerHTML=t.footer;
  document.querySelectorAll('#legalLangToggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===CUR_LANG));
  try{localStorage.setItem('zw_lang',CUR_LANG);}catch(e){}
  renderUpdates();
}

window.addEventListener('popstate',renderUpdates);
window.addEventListener('hashchange',renderUpdates);

(function(){
  let saved='tr';
  try{saved=localStorage.getItem('zw_lang')||'tr';}catch(e){}
  if(saved!=='tr')saved='en';
  setLegalLang(saved);
})();
