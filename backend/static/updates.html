    'O gece hayatını kaybeden 251 şehidimizi ve o gece yaralanan gazilerimizi saygı ve minnetle anıyoruz. Ruhları şad olsun.'
  ],
  en:[
    '<strong>Today is July 15th.</strong> Before we get to the headline below, we wanted to say something first: this isn\'t an update announcement, just a moment of remembrance.',
    'On this night in 2016, ordinary people across this country — civil servants, shopkeepers, students, retirees — walked out in front of tanks with nothing to shield them and nothing to gain, without anyone ordering them to. No one called them to duty. They simply wanted to keep living on their own terms in their own country, and they paid the heaviest price for it, with their lives.',
    'Even a small project like ZenithW stands on that freedom in its own way — being able to share an idea openly, keep a site running without fear of it being shut down, write code and put it in people\'s hands. None of that is guaranteed. It exists because someone, somewhere, paid for it.',
    'We remember the 251 people who lost their lives that night, and the veterans who were wounded defending it, with respect and gratitude. May they rest in peace.'
  ]
};

let CUR_LANG='tr';

function jumpTo(ver){
  history.pushState(null,'','#'+ver);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function findIndex(ver){return UPDATES.findIndex(u=>u.ver===ver);}

function render(){
  const t=TX[CUR_LANG];
  const hash=decodeURIComponent((location.hash||'').replace('#',''));
  let idx=findIndex(hash);
  if(idx===-1)idx=0;
  const u=UPDATES[idx];

  document.getElementById('updBadge').textContent=u.ver;
  document.getElementById('updBadge').classList.toggle('is-latest',!!u.latest);
  document.getElementById('updDate').textContent=CUR_LANG==='tr'?u.dateTr:u.dateEn;
  document.getElementById('updPostTitle').textContent=CUR_LANG==='tr'?u.titleTr:u.titleEn;

  const anma=ANMA[CUR_LANG]||ANMA.en;
  document.getElementById('updAnma').innerHTML=idx===0?anma.map(p=>`<p>${p}</p>`).join(''):'';

  const intro=CUR_LANG==='tr'?u.introTr:u.introEn;
  document.getElementById('updIntro').innerHTML=intro.map(p=>`<p>${p}</p>`).join('');

  document.getElementById('updSections').innerHTML=u.sections.map(s=>`
    <div class="upd-section">
      <h2>${CUR_LANG==='tr'?s.hTr:s.hEn}</h2>
      <p>${CUR_LANG==='tr'?s.pTr:s.pEn}</p>
    </div>`).join('');

  document.getElementById('updOutro').textContent=CUR_LANG==='tr'?u.outroTr:u.outroEn;
  document.getElementById('updSignoff').textContent=t.signoff;

  const picker=document.getElementById('verPicker');
  picker.innerHTML=UPDATES.map(x=>`<option value="${x.ver}"${x.ver===u.ver?' selected':''}>${x.ver}${x.latest?' · '+t.latestLabel:''}</option>`).join('');

  const newer=UPDATES[idx-1], older=UPDATES[idx+1];
  let nav='';
  if(newer)nav+=`<div class="upd-nav-link" onclick="jumpTo('${newer.ver}')"><span class="upd-nav-label">${CUR_LANG==='tr'?'yeni sürüm':'newer'}</span>← ${newer.ver}</div>`;
  else nav+=`<div></div>`;
  if(older)nav+=`<div class="upd-nav-link next" onclick="jumpTo('${older.ver}')"><span class="upd-nav-label">${CUR_LANG==='tr'?'eski sürüm':'older'}</span>${older.ver} →</div>`;
  else nav+=`<div></div>`;
  document.getElementById('updNavRow').innerHTML=nav;

  document.title=`${u.ver} — ${CUR_LANG==='tr'?u.titleTr:u.titleEn} — ZenithW`;
}

function setLegalLang(l){
  const t=TX[l]||TX.en;
  CUR_LANG=TX[l]?l:'en';
  document.documentElement.lang=CUR_LANG;
  document.getElementById('pgTitle').textContent=t.title;
  document.getElementById('pgDesc').setAttribute('content',t.desc);
  document.getElementById('pgBack').textContent=t.back;
  document.querySelectorAll('#legalLangToggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===CUR_LANG));
  try{localStorage.setItem('zw_lang',CUR_LANG);}catch(e){}
  render();
}

window.addEventListener('popstate',render);
window.addEventListener('hashchange',render);

(function(){
  let saved='tr';
  try{saved=localStorage.getItem('zw_lang')||'tr';}catch(e){}
  if(saved!=='tr')saved='en';
  setLegalLang(saved);
})();
</script>
</body>
</html>
